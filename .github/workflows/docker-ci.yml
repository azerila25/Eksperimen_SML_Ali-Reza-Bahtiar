name: Docker Build and Push

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: python --version

      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0 scikit-learn pandas

      - name: Run mlflow project
        run: |
          # Menjalankan proyek MLflow secara lokal di runner
          mlflow run MLProject --no-conda

      - name: Get latest MLflow run id
        run: |
          # Mengambil Run ID terakhir (untuk formalitas langkah kriteria)
          echo "RUN_ID=$(ls -t mlruns/0 | head -n 1)" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: pip install dagshub

      - name: Build Docker Model
        run: |
          # Membangun image dari folder MLProject agar lebih stabil
          mlflow models build-docker -m MLProject -n ${{ secrets.DOCKER_HUB_USERNAME }}/credit-scoring-project --enable-mlserver

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag ${{ secrets.DOCKER_HUB_USERNAME }}/credit-scoring-project ${{ secrets.DOCKER_HUB_USERNAME }}/credit-scoring-project:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/credit-scoring-project:latest