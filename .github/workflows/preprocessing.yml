name: Automate Data Preprocessing
on:
  push:
    branches: [ main ]
  workflow_dispatch: # Bisa ditrigger manual
jobs:
  preprocess:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'
    - name: Install dependencies
      run: |
        pip install pandas scikit-learn
    - name: Run preprocessing script
      run: python automate_Ali-Reza-Bahtiar.py
    - name: Commit and push changes
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add dataset_preprocessing.csv
        git commit -m "Automated data preprocessing" || echo "No changes to commit"
        git push